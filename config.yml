baseURL: "https://darshit.dev/"
title: Darshit Patel's Blog
theme: hugo-PaperMod
canonifyurls: true
pygmentsCodeFences: true
enableEmoji: true
summaryLength: 30
pagination:
  pagerSize: 10
disqusShortName: darshitpp

# Top-level author for RSS template compatibility
author:
  name: Darshit Patel

params:
  # Author name as string for theme meta display
  author: "Darshit Patel"

  # Disable Google Analytics to avoid missing partial error
  analytics:
    google:
      id: ""

  # Home page info
  homeInfoParams:
    Title: "Hi there 👋! Welcome to my website!"
    Content:
        >
            I am a Software Engineer, with a special interest in working with Backend Technologies like Java. Here, I document some things that I learn, and find interesting. You can learn more about what I do on the About page!

  # Site settings
  env: production
  tagline: Some things that I learn and find interesting
  description: "Darshit Patel's Blog: Some things that I learn and find interesting"
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  hideSummary: false
  defaultTheme: auto
  disableSpecial1stPost: true
  comments: true

  # Social icons
  socialIcons:
    - name: twitter
      url: "https://twitter.com/darshitpp"
    - name: github
      url: "https://github.com/darshitpp"
    - name: linkedin
      url: "https://linkedin.com/in/darshitpp"

  # Search settings
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - RSS
    - JSON
